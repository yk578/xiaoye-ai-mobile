<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Expo QR</title></head>
<body style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a;color:#fff;font-family:sans-serif;margin:0">
  <h2 style="margin-bottom:8px">📱 扫码打开 Expo Go</h2>
  <p style="color:#888;margin-bottom:20px">小叶AI v1.0 Android</p>
  <div id="qrcode" style="background:#fff;padding:20px;border-radius:16px"></div>
  <p style="margin-top:24px;color:#888;font-size:14px">
    或手动输入：<br>
    <code style="color:#7c3aed;font-size:16px;user-select:all">exp://g51evca-anonymous-8081.exp.direct</code>
  </p>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById('qrcode'), {
      text: 'exp://g51evca-anonymous-8081.exp.direct',
      width: 300,
      height: 300,
      colorDark: '#000000',
      colorLight: '#ffffff',
    });
  </script>
</body>
</html>
